<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Histórico de Libro - Prototipo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; margin: 0; padding: 40px; color: #f3f4f6; }
        .pantalla { max-width: 900px; margin: 0 auto; background-color: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .cabecera { background-color: #1e293b; padding: 25px 30px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .cabecera h1 { margin: 0; font-size: 22px; color: #3b82f6; }
        .usuario { font-size: 13px; color: #9ca3af; }
        .contenido { padding: 30px; }
        .buscador { display: flex; gap: 12px; margin-bottom: 30px; }
        input[type="text"] { flex-grow: 1; padding: 12px; border-radius: 6px; border: 1px solid #334155; background-color: #0f172a; color: white; }
        button { background-color: #3b82f6; color: white; border: none; font-weight: bold; cursor: pointer; padding: 12px 24px; border-radius: 6px; transition: 0.2s; }
        button:hover { background-color: #2563eb; }
        .resumen { display: flex; gap: 20px; margin-bottom: 30px; }
        .caja-resumen { background-color: #0f172a; padding: 20px; border-radius: 8px; flex: 1; border: 1px solid #334155; border-left: 4px solid #3b82f6; }
        .caja-resumen h3 { margin: 0 0 8px 0; font-size: 12px; color: #9ca3af; text-transform: uppercase; }
        .caja-resumen p { margin: 0; font-size: 24px; font-weight: bold; color: #f3f4f6; }
        .columnas { display: flex; gap: 30px; }
        .columna-izq, .columna-der { flex: 1; }
        h2 { font-size: 16px; color: #f9fafb; margin-bottom: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; background-color: #0f172a; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #334155; padding: 12px; text-align: left; }
        th { background-color: #1e293b; color: #3b82f6; }
        .caja-grafica { height: 220px; background-color: #0f172a; border: 1px dashed #334155; display: flex; align-items: center; justify-content: center; color: #64748b; border-radius: 8px; flex-direction: column; }
    </style>
</head>
<body>
    <div class="pantalla">
        <div class="cabecera">
            <h1>Consultar Histórico de Libro</h1>
            <div class="usuario">Empleado: <strong>zeredev</strong></div>
        </div>
        <div class="contenido">
            <div class="buscador">
                <input type="text" value="El Imperio Final">
                <button>Buscar Historial</button>
            </div>
            <div class="resumen">
                <div class="caja-resumen"><h3>Primer Ejemplar</h3><p>12/05/2021</p></div>
                <div class="caja-resumen"><h3>Ventas Totales</h3><p>342 uds.</p></div>
            </div>
            <div class="columnas">
                <div class="columna-izq">
                    <h2>Desglose Anual</h2>
                    <table>
                        <tr><th>Año</th><th>Unidades</th></tr>
                        <tr><td>2021</td><td>45</td></tr>
                        <tr><td>2022</td><td>82</td></tr>
                    </table>
                </div>
                <div class="columna-der">
                    <h2>Evolución</h2>
                    <div class="caja-grafica"><span>📉</span><p>Gráfico de Tendencia</p></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
